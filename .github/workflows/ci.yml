name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex/**
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: ./scripts/bootstrap --frozen

      - name: Run lint
        run: ./scripts/lint

      - name: Run unit test suite
        run: ./scripts/test
