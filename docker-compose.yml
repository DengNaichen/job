services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: job-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_db
    ports:
      - "5434:5432"
    volumes:
      - job_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_db"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  job_postgres_data:
